services:
    app:
        env_file: !override
            - ${PASSWORD_GENERATOR_ENV_FILE:?Set PASSWORD_GENERATOR_ENV_FILE to the production env file path}
        depends_on: !reset []
        extra_hosts:
            - "host.docker.internal:host-gateway"

    nginx:
        expose:
            - "80"

    db:
        profiles:
            - local-db
