services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        user: "1000:1000"
        env_file: .env
        volumes:
            - storage:/var/www/html/storage
            - public_assets:/var/www/html/public
        networks:
            - internal
        depends_on:
            - db

    nginx:
        image: nginx:alpine
        expose:
            - 80
        volumes:
            - ./nginx/internal.conf:/etc/nginx/conf.d/default.conf:ro
            - public_assets:/var/www/html/public:ro
        networks:
            - internal
            - wyrmrest_network
            - proxy
        labels:
            - traefik.enable=true
            - traefik.docker.network=proxy
            - traefik.http.middlewares.password-generator-strip.stripprefix.prefixes=/password-generator
            - traefik.http.routers.password-generator.rule=(Host(`wyrmrest.it`) || Host(`www.wyrmrest.it`) || Host(`wyrmrest.com`) || Host(`www.wyrmrest.com`)) && PathPrefix(`/password-generator`)
            - traefik.http.routers.password-generator.entrypoints=websecure
            - traefik.http.routers.password-generator.tls=true
            - traefik.http.routers.password-generator.priority=100
            - traefik.http.routers.password-generator.middlewares=password-generator-strip@docker
            - traefik.http.services.password-generator.loadbalancer.server.port=80
        depends_on:
            - app

    db:
        image: mysql:8.0
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - internal

networks:
    internal:
    wyrmrest_network:
        external: true
        name: wyrmrest_network
    proxy:
        external: true
        name: proxy

volumes:
    storage:
    db_data:
    public_assets:
