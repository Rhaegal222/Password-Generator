services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        env_file: .env
        volumes:
            - storage:/var/www/html/storage
            - public_assets:/var/www/html/public
        networks:
            - internal
        depends_on:
            - db

    nginx:
        image: nginx:alpine
        ports:
            - "8096:80"
        volumes:
            - ./nginx/internal.conf:/etc/nginx/conf.d/default.conf:ro
            - public_assets:/var/www/html/public:ro
        networks:
            - internal
        depends_on:
            - app

    db:
        image: mysql:8.0
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - internal

networks:
    internal:

volumes:
    storage:
    db_data:
    public_assets:
