name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

jobs:
  lint-and-test:
    name: PHP 8.3 / Laravel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, pdo, pdo_mysql, gd
          coverage: none

      - name: Copy .env
        working-directory: service
        run: cp .env.example .env

      - name: Install Composer dependencies
        working-directory: service
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Generate app key
        working-directory: service
        run: php artisan key:generate

      - name: Install frontend dependencies
        working-directory: service
        run: npm ci

      - name: Build frontend assets
        working-directory: service
        run: npm run build

      - name: Run PHPUnit tests
        working-directory: service
        run: php artisan test

      - name: Check vulnerable dependencies
        working-directory: service
        run: composer audit --no-dev

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Lowercase repository owner
        run: |
          echo "OWNER_LC=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.OWNER_LC }}/password-generator
          tags: |
            type=sha
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/password-generator:cache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/password-generator:cache,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
