services:
    db:
        environment:
            MYSQL_DATABASE: password_generator_000_develop
            MYSQL_ROOT_PASSWORD: password_generator_root
            MYSQL_USER: password_generator
            MYSQL_PASSWORD: password_generator_local

    app:
        environment:
            DB_HOST: db
            DB_DATABASE: password_generator_000_develop
            DB_USERNAME: password_generator
            DB_PASSWORD: password_generator_local
            DB_ROOT_PASSWORD: password_generator_root
        volumes:
            - ./service:/var/www/html
            - /var/www/html/vendor

    nginx:
        volumes:
            - ./nginx/internal.conf:/etc/nginx/conf.d/default.conf:ro
            - ./service/public:/var/www/html/public:ro
        labels:
            - traefik.enable=false
